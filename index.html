<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 25px;
        }

        .sidebar {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: bold;
        }

        .main-viewport {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .info-summary-container {
            background-color: #020617;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .reactor-id {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.95rem;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
        }

        .live-status-pill {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .param-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .param-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .param-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-main);
        }

        .alert-box {
            background-color: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
            color: #fca5a5;
            font-size: 0.9rem;
        }

        .alert-box.warning {
            background-color: rgba(251, 191, 36, 0.15);
            border: 1px solid var(--accent-amber);
            color: #fde047;
        }

        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .material-table th, .material-table td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        .material-table th {
            background-color: var(--bg-primary);
            color: var(--accent-blue);
        }

        .process-details-section h2 {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-tertiary);
            padding-bottom: 8px;
        }

        .step-block {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-blue);
        }

        .step-block h4 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .sub-steps-list {
            list-style: none;
        }

        .sub-steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .sub-steps-list li::before {
            content: "→";
            color: var(--accent-blue);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                width: 100%;
                max-height: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>N I T Y A<h1>
        <p> Module-3</p>
    </header>

    <div class="container">
        <nav class="sidebar">
            <h3>PROCESS FLOW STEPS </h3>
            
            <div class="nav-group">

                <button id="btn-cello-coupling" class="nav-btn" onclick="switchStage('cello-coupling')">05: 4th PAA 'Cello' Coupling</button>
                <button id="btn-curtis-coupling" class="nav-btn" onclick="switchStage('curtis-coupling')">06: 5th PAA 'Curtis' Coupling</button>
                <button id="btn-lantus-coupling" class="nav-btn" onclick="switchStage('lantus-coupling')">07: 6th PAA 'Lantus' Coupling</button>

                <button id="btn-windstar-coupling" class="nav-btn" onclick="switchStage('windstar-coupling')">09: 8th PAA 'Windstar' Coupling</button>
                <button id="btn-dry-material" class="nav-btn" onclick="switchStage('dry-material')">10: Dry Material Master Mapping</button>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Stage II: Cleavage & Workup</div>
                <button id="btn-cleavage-reaction" class="nav-btn" onclick="switchStage('cleavage-reaction')">11: Tahan Sol. Cleavage</button>
                <button id="btn-extraction-precipitation" class="nav-btn" onclick="switchStage('extraction-precipitation')">12: Extraction & Precipitation</button>
            </div>
        </nav>

        <main class="main-viewport" id="stage-viewport">
            <!-- Injected dynamically -->
        </main>
    </div>

        function switchStage(stageKey) {

            const data = processDatabase[stageKey];
            const viewport = document.getElementById('stage-viewport');

                return;
            }

            let parameterCardsHtml = '';
            data.params.forEach(p => {
                parameterCardsHtml += `

                        <div class="param-label">${p.label}</div>
                        <div class="param-value">${p.value}</div>
                    </div>
                `;

                materialRowsHtml += `

                        <td style="font-family:monospace; font-weight:bold;">${m.qty}</td>
                    </tr>
                `;
            });

            let stepBlocksHtml = '';
            data.steps.forEach((step, idx) => {
                let subStepItems = '';
                step.details.forEach(detail => {
                    subStepItems += `<li>${detail}</li>`;
                });

                stepBlocksHtml += `
                    <div class="step-block">
                        <h4>Sub-Section ${idx + 1}: ${step.title}</h4>
                        <ul class="sub-steps-list">
                            ${subStepItems}
                        </ul>
                    </div>
