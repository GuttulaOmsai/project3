<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 25px;
        }

        .sidebar {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: bold;
        }

        .main-viewport {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .mimic-panel {
            background-color: #020617;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .mimic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reactor-id {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
        }

        .live-status-pill {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-status-pill::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .param-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .param-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .param-value {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-main);
            margin-top: 4px;
        }

        .alert-box {
            background-color: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
            color: #fca5a5;
            font-size: 0.9rem;
        }

        .alert-box.warning {
            background-color: rgba(251, 191, 36, 0.15);
            border: 1px solid var(--accent-amber);
            color: #fde047;
        }

        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .material-table th, .material-table td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        .material-table th {
            background-color: var(--bg-primary);
            color: var(--accent-blue);
        }

        .process-details-section h2 {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-tertiary);
            padding-bottom: 8px;
        }

        .step-block {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-blue);
        }

        .step-block h4 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .sub-steps-list {
            list-style: none;
        }

        .sub-steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .sub-steps-list li::before {
            content: "→";
            color: var(--accent-blue);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .highlight-text {
            color: var(--accent-amber);
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                width: 100%;
                max-height: none;
            }
        }
    </style>
</head>

                            "Verify that all raw material factors used in Pages 03-11 perfectly align with the registered chemical nomenclature listed on Page 12.",
                            "Ensure that inventory codes match the original plant master database before starting Stage-II Cleavage."
                        ]
                    }
                ]
            },
            'cleavage-reaction': {
                title: "Stage II Cleavage: 1% Tahan Solution Phase (Page 13)",
                vessel: "303HSPPS-C 3003",
                vesselType: "Hastelloy MOC | Cap: 1.0 KL",
                input: "180 Kgs (30 Kgs × 6 Sub Lots)",
                output: "~87 (±9) Kgs from 6 Lots",
                params: [
                    { label: "Tahan Qty", value: "594 Lts (Factor: 19.800)" },
                    { label: "MCI Volume", value: "300 Lts (Factor: 10.000)" },
                    { label: "Cleavage Stir", value: "10±5 Min at 25±3°C" }
                ],
                alerts: [
                    { type: 'danger', text: "Critical Parameter: Total tahan exposure must be limited to NMT 40 Min. Temperature of Tahan/MCI solution must be maintained between 22°C and 28°C." }
                ],
                materials: [
                    { name: "Nitya-I (dry) material", factor: "1.0000", qty: "30 Kgs" },
                    { name: "MCI", factor: "10.0000", qty: "300 Lts" },
                    { name: "Tahan", factor: "19.8000", qty: "594 Lts" },
                    { name: "DM Water", factor: "10.0000", qty: "300 Lts" }
                ],
                steps: [
                    {
                        title: "Resin Loading & Tahan Solution Cleavage",
                        details: [
                            "Charge Nitya-I (dry) material into HSPPS under N2 atmosphere.",
                            "Charge MCI into HSPPS under N2 atmosphere; stir for NLT 40±5 Min at 25±3°C under N2 atmosphere.",
                            "Filter the mass from HSPPS to waste tank under N2 atmosphere.",
                            "Transfer the 1% Tahan Sol from Reactor to HSPPS at 25±3°C; stir the mass in HSPPS for 10±5 Min at 25±3°C under N2."
                        ]
                    },
                    {
                        title: "Neutralization Cascade",
                        details: [
                            "Filter the mass from HSPPS to Neutralization reactor under N2 atmosphere.",
                            "Charge DM water into Neutralization reactor under N2 atmosphere, followed by Charge Vietnam into Reactor under N2 atmosphere.",
                            "Cool the Vietnam at 25±5°C; stir the mass for NLT 30 min at 25±5°C.",
                            "Settle the mass for NLT 45 min at 25±5°C, then separate the organic layer into RT from Neutralization reactor."
                        ]
                    }
                ]
            },
            'extraction-precipitation': {
                title: "Stage II Cleavage: Extraction & Precipitation (Page 14)",
                vessel: "303SSR-C 3007 / 3008 / 3010",
                vesselType: "SS316 Extraction & Concentration Loop",
                input: "Individual Lot Procedure",
                output: "~87 (±9) Kgs Final Dry Material",

                ],

        function switchStage(stageKey) {
            const data = processDatabase[stageKey];
            if (!data) return;

            // Update Active Class on Sidebar Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Generate Parameters Grid Cards
            let paramsHTML = '';
            data.params.forEach(p => {
                paramsHTML += `
                    <div class="param-card">
                        <div class="param-label">${p.label}</div>
                        <div class="param-value">${p.value}</div>
                    </div>
                `;
            });

            // Generate Warning/Alert Boxes
            let alertsHTML = '';
            data.alerts.forEach(a => {
                alertsHTML += `
                    <div class="alert-box ${a.type === 'danger' ? '' : 'warning'}">
                        <strong>${a.type === 'danger' ? 'CRITICAL CPP ALERT:' : 'PROCESS NOTE:'}</strong> ${a.text}
                    </div>
                `;
            });

            // Generate Materials Table Content
            let materialsHTML = '';
            if (data.materials && data.materials.length > 0) {
                materialsHTML += `
                    <h3>Raw Material Charges Configuration</h3>
                    <table class="material-table">
                        <thead>
                            <tr>
                                <th>Raw Material / Code Name</th>
                                <th>Factor Value</th>
                                <th>Charge Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                data.materials.forEach(m => {
                    materialsHTML += `
                        <tr>
                            <td><strong>${m.name}</strong></td>
                            <td>${m.factor}</td>
                            <td><span class="highlight-text">${m.qty}</span></td>
                        </tr>
                    `;
                });
                materialsHTML += `</tbody></table>`;
            }

            // Generate Step-by-Step Blocks
            let stepsHTML = '';
            data.steps.forEach((step, idx) => {
                let subSteps = '';
                step.details.forEach(detail => {
                    subSteps += `<li>${detail}</li>`;
                });

                stepsHTML += `
                    <div class="step-block">
                        <h4>Step ${idx + 1}: ${step.title}</h4>
                        <ul class="sub-steps-list">
                            ${subSteps}
                        </ul>
                    </div>
                `;
            });

            // Construct Full Viewport Structure
            const container = document.getElementById('stage-viewport');
            container.innerHTML = `
                <div class="mimic-panel">
                    <div class="mimic-header">
                        <div>
                            <span class="reactor-id">${data.vessel}</span>
                            <span style="color: var(--text-muted); font-size: 0.9rem; margin-left: 10px;">${data.vesselType}</span>
                        </div>
                        <div class="live-status-pill">System Engaged</div>
                    </div>
                    
                    <h2 style="color: var(--text-main); margin-bottom: 10px;">${data.title}</h2>
                    
                    <div class="dashboard-grid">
                        ${paramsHTML}
                    </div>
                    
                    ${alertsHTML}
                </div>

                ${materialsHTML}

                <div class="process-details-section">
                    <h2>Step-by-Step Production Formulation</h2>
                    ${stepsHTML}
                </div>
            `;
        }

        // Initialize dashboard content with the first option on page startup
        window.onload = function() {
            switchStage('nortel-coupling');
        };
    </script>
</body>
</html>
